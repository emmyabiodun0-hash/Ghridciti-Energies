{% extends "based.html" %}
{% block title %}Edit Profile — Ghridciti Energy{% endblock %}

{% block content %}

<section class="page active" id="page-edit-profile">

    <div class="page-header">
        <h2 class="page-title">Edit Profile</h2>
        <p class="page-sub">
            Update your account information.
        </p>
    </div>

    <div class="glass-card edit-profile-card">

        <form method="POST">

            <div class="avatar-circle">
                {{ current_user.username[0]|upper }}
            </div>

            <div class="form-group">
                <label>
                    <i class="fas fa-user"></i>
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    value="{{ current_user.username }}"
                    placeholder="Enter username"
                    required
                >
            </div>

            <div class="form-group">
                <label>
                    <i class="fas fa-envelope"></i>
                    Email Address
                </label>

                <input
                    type="email"
                    value="{{ current_user.email }}"
                    disabled
                >

                <small>Email address cannot be changed.</small>
            </div>

            <div class="button-group">

                <button class="btn-primary" type="submit">
                    <i class="fas fa-save"></i>
                    Save Changes
                </button>

                <a href="{{ url_for('profile') }}" class="btn-outline">
                    <i class="fas fa-arrow-left"></i>
                    Cancel
                </a>

            </div>

        </form>

    </div>

</section>

<style>

.edit-profile-card{
    max-width:650px;
    margin:auto;
    padding:35px;
}

.avatar-circle{
    width:90px;
    height:90px;
    border-radius:50%;
    background:var(--green);
    color:#000;
    font-size:2rem;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:center;
    margin:0 auto 30px;
}

.form-group{
    margin-bottom:22px;
}

.form-group label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

.form-group label i{
    margin-right:8px;
}

.form-group input{
    width:100%;
    padding:14px;
    border-radius:12px;
    border:1px solid var(--border);
    background:transparent;
    color:var(--text);
    font-size:15px;
    outline:none;
}

.form-group input:focus{
    border-color:var(--green);
}

.form-group small{
    display:block;
    margin-top:8px;
    color:var(--text-muted);
}

.button-group{
    display:flex;
    gap:15px;
    margin-top:30px;
    flex-wrap:wrap;
}

.button-group a,
.button-group button{
    flex:1;
    justify-content:center;
    text-decoration:none;
}

@media(max-width:650px){

.button-group{
    flex-direction:column;
}

}

</style>

{% endblock %}
