{% extends 'base.html' %}

{% block style %}

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* Forgot Password Card */

.container{
    width:100%;
    max-width:420px;
    padding:40px;
    border-radius:20px;

    background:rgba(15,15,15,.92);

    border:1px solid rgba(0,255,102,.15);

    box-shadow:
        0 0 25px rgba(0,255,102,.08),
        0 0 60px rgba(0,255,102,.05);

    text-align:center;

    backdrop-filter:blur(12px);

    box-sizing:border-box;
}

/* Logo */

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:20px;
}

.logo img{
    width:110px;
    max-width:35vw;
    height:auto;

    object-fit:contain;

    display:block;
}

/* Title */

h2{
    color:#00ff66;
    margin-bottom:10px;
    font-size:30px;
}

.subtitle{
    color:#9ca3af;
    font-size:14px;
    margin-bottom:30px;
    line-height:1.7;
}

/* Input */

input{
    width:100%;
    padding:15px;
    border-radius:12px;

    border:1px solid #222;

    background:#0f0f0f;

    color:white;

    outline:none;

    font-size:15px;

    transition:.3s;

    margin-bottom:20px;

    box-sizing:border-box;
}

input::placeholder{
    color:#666;
}

input:focus{
    border-color:#00ff66;

    box-shadow:
        0 0 10px rgba(0,255,102,.25);
}

/* Button */

button{
    width:100%;
    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #00ff66,
        #00cc52
    );

    color:#050505;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

button:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(0,255,102,.25);
}

/* Footer Text */

.footer-text{
    color:#777;
    font-size:13px;
    margin-top:18px;
    line-height:1.6;
}

/* Tablet */

@media(max-width:768px){

    .container{
        padding:32px;
    }

    .logo img{
        width:95px;
    }

    h2{
        font-size:26px;
    }
}

/* Mobile */

@media(max-width:480px){

    body{
        padding:15px;
    }

    .container{
        padding:24px;
        border-radius:16px;
    }

    .logo img{
        width:80px;
    }

    h2{
        font-size:22px;
    }

    .subtitle{
        font-size:12px;
        line-height:1.6;
    }

    input,
    button{
        padding:13px;
        font-size:14px;
    }

    .footer-text{
        font-size:12px;
    }
}

</style>

{% endblock %}

{% block content %}

<div class="container">

```
<div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}"
         alt="Ghridciti Energy Logo">
</div>

<h2>Forgot Password</h2>

<p class="subtitle">
    Enter your registered email address and we'll send you
    a verification code to reset your password.
</p>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Enter your email address"
        required
    >

    <button type="submit">
        Send OTP
    </button>

</form>

<p class="footer-text">
    Ghridciti Energy Account Recovery
</p>
```

</div>

{% endblock %}
