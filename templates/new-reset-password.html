{% extends 'base.html' %}

{% block style %}

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#050505;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    padding:20px;
}

/* Reset Password Card */

form{
    width:100%;
    max-width:420px;

    display:flex;
    flex-direction:column;
    gap:18px;

    padding:40px;

    background:rgba(15,15,15,.92);

    border:1px solid rgba(0,255,102,.15);

    border-radius:20px;

    box-shadow:
        0 0 25px rgba(0,255,102,.08),
        0 0 60px rgba(0,255,102,.05);

    backdrop-filter:blur(12px);

    text-align:center;

    box-sizing:border-box;
}

/* Logo */

.logo{
    display:flex;
    justify-content:center;
    align-items:center;
    margin-bottom:10px;
}

.logo img{
    width:110px;
    max-width:35vw;
    height:auto;
    object-fit:contain;
    display:block;
}

/* Title */

h2{
    color:#00ff66;
    font-size:30px;
    margin:0;
}

/* Description */

.subtitle{
    color:#9ca3af;
    font-size:14px;
    line-height:1.7;
    margin-bottom:10px;
}

/* Inputs */

input[type="password"]{
    width:100%;

    padding:15px;

    border-radius:12px;

    border:1px solid #222;

    background:#0f0f0f;

    color:white;

    outline:none;

    font-size:15px;

    transition:.3s;

    box-sizing:border-box;
}

input[type="password"]::placeholder{
    color:#666;
}

input[type="password"]:focus{
    border-color:#00ff66;

    box-shadow:
        0 0 12px rgba(0,255,102,.25);
}

/* Button */

input[type="submit"]{
    width:100%;

    padding:15px;

    border:none;

    border-radius:12px;

    background:linear-gradient(
        135deg,
        #00ff66,
        #00cc52
    );

    color:#050505;

    font-size:16px;

    font-weight:700;

    cursor:pointer;

    transition:.3s;
}

input[type="submit"]:hover{
    transform:translateY(-2px);

    box-shadow:
        0 10px 25px rgba(0,255,102,.25);
}

/* Footer */

.footer{
    color:#777;
    font-size:13px;
    margin-top:5px;
}

/* Tablet */

@media(max-width:768px){

    form{
        padding:32px;
    }

    .logo img{
        width:95px;
    }

    h2{
        font-size:26px;
    }
}

/* Mobile */

@media(max-width:480px){

    body{
        padding:15px;
    }

    form{
        padding:24px;
        border-radius:16px;
    }

    .logo img{
        width:80px;
    }

    h2{
        font-size:22px;
    }

    .subtitle{
        font-size:12px;
        line-height:1.6;
    }

    input[type="password"],
    input[type="submit"]{
        padding:13px;
        font-size:14px;
    }

    .footer{
        font-size:12px;
    }
}

</style>

{% endblock %}

{% block content %}

<form action="" method="POST">

```
<div class="logo">
    <img src="{{ url_for('static', filename='logo.png') }}"
         alt="Ghridciti Energy Logo">
</div>

<h2>Reset Password</h2>

<p class="subtitle">
    Create a new secure password for your
    Ghridciti Energy account.
</p>

<input
    type="password"
    name="password"
    placeholder="Enter new password"
    required
>

<input
    type="submit"
    value="Reset Password"
>

<div class="footer">
    Ghridciti Energy Account Security
</div>
```

</form>

{% endblock %}
