{% extends "based.html" %}
{% block title %}Profile — Ghridciti Energy{% endblock %}
{% block content %}
<section class="page active" id="page-profile">
  <div class="page-header">
    <h2 class="page-title">Profile</h2>
    <p class="page-sub">Manage your personal information.</p>
  </div>
  <div class="glass-card profile-card">
    <div class="profile-avatar-wrap">
      <div class="profile-avatar">E</div>
      <div>
        <h3>{{ current_user.username }}</h3>
        <p>Customer · {{ current_user.email }}</p>
      </div>
    </div>
    <div class="form-row mt-md">
      <div class="form-group floating">
        <input type="text" placeholder="" value="{{ current_user.username }}"/>
        <label>First Name</label>
      </div>
      <div class="form-group floating">
        <input type="text" placeholder=" " value="{{ current_user.username }}" />
        <label>Last Name</label>
      </div>
    </div>
    <div class="form-group floating">
      <input type="email" placeholder=" " value="{{ current_user.email }}" />
      <label>Email Address</label>
    </div>
    <div class="form-group floating">
      <input type="tel" placeholder=" " value="{{ current_user.phone if current_user.phone else '' }}" />
      <label>Phone Number</label>
    </div>
    <button class="btn-primary" onclick="showToast('Profile updated successfully!')">Save Changes</button>
  </div>
</section>
{% endblock %}
